<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayar DANA - Lannefy</title>
  <link rel="stylesheet" href="pay.css">
</head>
<body>

  <main class="container">

    <!-- TIMER -->
    <!-- TIMER -->

    <!-- TIMER -->
<div class="timer-box">
  <div class="timer-content">
    <span>Selesaikan pembayaran dalam</span>
    <span id="timer">Timer Dimulai</span>
  </div>
<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>
  <div id="timerEnd" class="timer-end">Waktu Habis</div>
</div>

    <!-- STRUK DETAIL PESANAN -->
    <div class="struk-box">
      <div class="struk-header">
        <span>Informasi Pesanan</span>
      </div>
      <br>
      <div class="struk-detail">
        <div class="struk-row">
          <div class="row-left">
            <span class="label">ID Pesanan</span>
            <span class="value" id="orderId">-</span>
          </div>
        </div>
        <div class="struk-row">
          <div class="row-left">
            <span class="label">Username</span>
            <span class="value" id="orderUser">-</span>
          </div>
        </div>
        <div class="struk-row">
          <div class="row-left">
            <span class="label">Layanan</span>
            <span class="value" id="orderService">-</span>
          </div>
        </div>
        <div class="struk-row">
          <div class="row-left">
            <span class="label">Jumlah</span>
            <span class="value" id="orderQty">-</span>
          </div>
        </div>
        <div class="struk-row total-row">
          <div class="row-left">
            <span class="label">Total Harga</span>
            <span class="value" id="orderTotal">-</span>
          </div>
        </div>
      </div>
    </div>

    <!-- PAYMENT INFO BOX -->
<div class="payment-info-box">
  <div class="payment-info-header">Informasi Payment</div>
  <div class="payment-info-content">
    <img src="../pict/dana.png" alt="DANA" class="payment-icon">
    <span id="danaNumber">0831-7180-4227</span>
    <img src="../pict/copy.png" alt="Salin" class="copy-icon" id="copyDana">
  </div>
  <p class="payment-instruction">
    Silahkan lakukan pembayaran ke nomor ini dengan nominal 
    <span id="paymentAmount">Rp. -</span>
  </p>
</div>
  </main>

  <script src="pay.js"></script>
</body>
</html>
